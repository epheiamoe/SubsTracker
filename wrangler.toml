name = "subscription-manager"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[durable_objects]
bindings = [
  { name = "RATE_LIMITER", class_name = "RateLimiterDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["RateLimiterDO"]

# KV 命名空间配置（自动生成）
[[kv_namespaces]]
binding = "SUBSCRIPTIONS_KV"
id = "a93b710d9a8e4a22bb84a32025872866"
preview_id = "a6bac6271d3a451697c2ad9c7dd0ec41"

[triggers]
crons = ["0 * * * *"]

[env.production]
name = "subscription-manager"
routes = [
  { pattern = "SubsTracker.epheia.moe/*", zone_id = "cc4d7d5845bc24f2b62286c5f80911cb" }
]

[env.staging]
name = "subscription-manager-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[env.staging.durable_objects]
bindings = [
  { name = "RATE_LIMITER", class_name = "RateLimiterDO" }
]

[[env.staging.migrations]]
tag = "v1"
new_classes = ["RateLimiterDO"]

[[env.staging.kv_namespaces]]
binding = "SUBSCRIPTIONS_KV"
id = "a93b710d9a8e4a22bb84a32025872866"
preview_id = "a6bac6271d3a451697c2ad9c7dd0ec41"
